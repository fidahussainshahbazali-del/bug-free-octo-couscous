<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Fida | Full Academy System</title>
    
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --main: #00e676; --bg: #080808; --panel: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        header { background: #000; padding: 15px; text-align: center; border-bottom: 3px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        
        /* Video Section */
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .v-feed { background: #000; height: 170px; border-radius: 15px; border: 2px solid #222; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 8px; border-radius: 5px; color: var(--main); }

        /* Auto-Discovery List */
        .discovery { background: var(--panel); margin: 10px; padding: 12px; border-radius: 12px; border: 1px solid #333; text-align: right; }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; }
        .call-btn { background: var(--main); color: black; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }

        /* Database Section */
        .db-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 10px; margin-top: 10px; }
        .db-card { background: var(--panel); padding: 12px; border-radius: 10px; text-align: center; border-bottom: 3px solid #333; cursor: pointer; font-size: 12px; }

        /* Chat System */
        .chat-box { background: #111; margin: 15px 10px; padding: 12px; border-radius: 15px; border: 1px solid #222; }
        #msgDisplay { height: 140px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding: 5px; background: #000; border-radius: 8px; margin-bottom: 10px; text-align: left; font-size: 13px; }
        .m-sent { align-self: flex-end; background: var(--main); color: black; padding: 5px 10px; border-radius: 8px; }
        .m-rcvd { align-self: flex-start; background: #333; color: white; padding: 5px 10px; border-radius: 8px; }
        .chat-input { display: flex; gap: 8px; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; }
        .send-btn { background: var(--main); border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; }

        /* Modal for Database */
        #db-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-height: 70%; background: #111; border: 2px solid var(--main); border-radius: 20px; z-index: 10001; padding: 20px; overflow-y: auto; text-align: right; }
    </style>
</head>
<body>

<header><h3 style="margin:0; color:var(--main);">FREE EDUCATION HUB</h3></header>

<div class="video-grid">
    <div class="v-feed" style="border-color: var(--main);">
        <video id="myCam" autoplay muted playsinline></video>
        <span class="label">آپ (Ustad Fida)</span>
    </div>
    <div class="v-feed">
        <video id="peerCam" autoplay playsinline></video>
        <span class="label" id="peerStatus">شاگرد (Live)</span>
    </div>
</div>

<div class="discovery">
    <h4 style="margin:0 0 8px 0; font-size: 14px; text-align: center; color: var(--main);">آن لائن نیٹ ورک</h4>
    <div id="online-list">تلاش جاری ہے...</div>
</div>

<div class="db-grid">
    <div class="db-card" onclick="openData('Chemistry')">🧪 Chem</div>
    <div class="db-card" onclick="openData('Biology')">🧬 Bio</div>
    <div class="db-card" onclick="openData('Physics')">⚡ Phy</div>
</div>

<div class="chat-box">
    <div id="msgDisplay"></div>
    <div class="chat-input">
        <input type="text" id="chatMsg" placeholder="پیغام لکھیں...">
        <button class="send-btn" onclick="sendChat()">SEND</button>
    </div>
</div>

<div id="db-modal">
    <div id="db-content"></div>
    <button onclick="document.getElementById('db-modal').style.display='none'" style="width:100%; padding:10px; margin-top:15px; background:var(--main); border:none; border-radius:10px; font-weight:bold;">بند کریں</button>
</div>

<script>
    const conf = { databaseURL: "https://free-education-hub-fida-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(conf);
    const db = firebase.database();
    const peer = new Peer();
    let stream;

    window.onload = async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('myCam').srcObject = stream;

            peer.on('open', (id) => {
                db.ref('active/' + id).set({id: id});
                db.ref('active/' + id).onDisconnect().remove();
            });

            // Discovery Logic
            db.ref('active').on('value', (snap) => {
                const list = document.getElementById('online-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const u = c.val();
                    if(u.id !== peer.id) {
                        list.innerHTML += `<div class="user-row">
                            <button class="call-btn" onclick="callUser('${u.id}')">LIVE CALL</button>
                            <span>شاگرد آن لائن 🟢</span>
                        </div>`;
                    }
                });
            });

            // Global Chat Logic
            db.ref('messages').limitToLast(10).on('child_added', (snap) => {
                const d = snap.val();
                const box = document.getElementById('msgDisplay');
                const type = d.sender === peer.id ? 'm-sent' : 'm-rcvd';
                box.innerHTML += `<div class="${type}"><b>${d.sender === peer.id ? 'آپ' : 'شاگرد'}:</b> ${d.text}</div>`;
                box.scrollTop = box.scrollHeight;
            });

        } catch (e) { alert("کیمرہ الاؤ کریں!"); }
    };

    function callUser(id) {
        const call = peer.call(id, stream);
        call.on('stream', (rs) => document.getElementById('peerCam').srcObject = rs);
    }

    peer.on('call', (call) => {
        call.answer(stream);
        call.on('stream', (rs) => document.getElementById('peerCam').srcObject = rs);
    });

    function sendChat() {
        const inp = document.getElementById('chatMsg');
        if(inp.value.trim() !== "") {
            db.ref('messages').push({ sender: peer.id, text: inp.value });
            inp.value = "";
        }
    }

    function openData(subject) {
        let html = `<h3>${subject} ڈیٹا بیس</h3><ul>`;
        for(let i=1; i<=15; i++) { html += `<li>${subject} ریکارڈ نمبر ${i} - مکمل تفصیل</li>`; }
        html += `</ul><p>ہزاروں مزید ریکارڈز موجود ہیں...</p>`;
        document.getElementById('db-content').innerHTML = html;
        document.getElementById('db-modal').style.display = 'block';
    }
</script>
</body>
</html>
