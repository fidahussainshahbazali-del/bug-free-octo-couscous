<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustad Fida VIP Hub</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; }
        header { background: #000; padding: 20px; border-bottom: 3px solid var(--neon); }
        .v-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .v-box { width: 45%; min-width: 310px; height: 260px; background: #111; border-radius: 20px; border: 2px solid #333; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .tag { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8); color: var(--neon); padding: 5px 12px; border-radius: 5px; font-size: 12px; border: 1px solid var(--neon); }
        #status-display { background: #111; color: #ffd700; padding: 10px; font-size: 13px; }
        .btn-call { background: var(--neon); color: black; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 20px; box-shadow: 0 5px 20px rgba(0,255,136,0.3); }
    </style>
</head>
<body>

<header><h2 style="margin:0;">FREE EDUCATION HUB</h2></header>
<div id="status-display">سسٹم سے رابطہ کیا جا رہا ہے...</div>

<div class="v-grid">
    <div class="v-box" style="border-color: #ffd700;">
        <video id="localVideo" autoplay muted playsinline></video>
        <span class="tag">آپ (USTAD FIDA)</span>
    </div>
    <div class="v-box">
        <video id="remoteVideo" autoplay playsinline></video>
        <span class="tag" id="peer-status">شاگرد (OFFLINE)</span>
    </div>
</div>

<div id="controls-panel" style="padding: 20px;">
    <div id="user-list">شاگردوں کی تلاش جاری ہے...</div>
</div>

<script>
    // 1. Firebase - (آپ کا ڈیٹا بیس لنک)
    const firebaseConfig = { databaseURL: "https://free-education-hub-fida-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. PeerJS - (آپ کی Key اور Google Servers)
    const peer = new Peer({
        key: 'r8_f3vUXVvOiRjNN82ml3CtFY8Hl8dRcpr1tUnm9', // آپ کی فراہم کردہ کی
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        }
    });

    let localStream;
    const statusText = document.getElementById('status-display');

    // کیمرہ آن کریں
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
        localStream = stream;
        document.getElementById('localVideo').srcObject = stream;
        statusText.innerText = "آپ کا کیمرہ تیار ہے۔";
    });

    // آن لائن رجسٹریشن
    peer.on('open', id => {
        statusText.innerText = "آپ آن لائن ہیں۔ آئی ڈی: " + id;
        database.ref('live_v7/' + id).set({ id: id });
        database.ref('live_v7/' + id).onDisconnect().remove();

        // شاگردوں کو دیکھنا
        database.ref('live_v7').on('value', snap => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            let anyone = false;
            snap.forEach(child => {
                const u = child.val();
                if (u.id !== id) {
                    anyone = true;
                    list.innerHTML = `<button class="btn-call" onclick="startCall('${u.id}')">شاگرد سے لائیو جڑیں</button>`;
                }
            });
            if(!anyone) list.innerHTML = "شاگرد ابھی آن لائن نہیں آیا...";
        });
    });

    // کال کرنا
    function startCall(target) {
        statusText.innerText = "رابطہ کیا جا رہا ہے...";
        const call = peer.call(target, localStream);
        call.on('stream', rs => {
            document.getElementById('remoteVideo').srcObject = rs;
            document.getElementById('peer-status').innerText = "شاگرد (LIVE)";
        });
    }

    // کال لینا
    peer.on('call', call => {
        call.answer(localStream);
        call.on('stream', rs => {
            document.getElementById('remoteVideo').srcObject = rs;
            document.getElementById('peer-status').innerText = "شاگرد (LIVE)";
        });
    });

</script>
</body>
</html>
