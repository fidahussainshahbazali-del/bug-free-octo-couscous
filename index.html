<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Fida Live Hub</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        header { background: #000; padding: 20px; border-bottom: 3px solid var(--neon); box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .v-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .v-box { width: 45%; min-width: 310px; height: 240px; background: #111; border-radius: 20px; border: 2px solid #222; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; top: 15px; left: 15px; background: rgba(0,255,136,0.15); color: var(--neon); padding: 5px 15px; border-radius: 50px; font-size: 11px; border: 1px solid var(--neon); }
        #status-bar { background: #111; color: var(--neon); padding: 10px; margin: 10px; font-size: 12px; border-radius: 10px; border: 1px solid #333; height: 40px; overflow: hidden; }
        .btn-live { background: var(--neon); color: black; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; margin: 20px; box-shadow: 0 10px 30px rgba(0,255,136,0.3); transition: 0.3s; }
        .btn-live:active { transform: scale(0.95); }
        .user-list { background: #111; margin: 20px; padding: 20px; border-radius: 20px; border: 1px solid #222; }
    </style>
</head>
<body>

<header><h1 style="margin:0; letter-spacing:2px;">FREE EDUCATION HUB</h1></header>

<div id="status-bar">سسٹم شروع ہو رہا ہے... براہ کرم انتظار کریں</div>

<div class="v-grid">
    <div class="v-box" style="border-color: var(--neon);">
        <video id="myCam" autoplay muted playsinline></video>
        <span class="label">آپ (USTAD FIDA)</span>
    </div>
    <div class="v-box">
        <video id="peerCam" autoplay playsinline></video>
        <span class="label">شاگرد (LIVE)</span>
    </div>
</div>

<div class="user-list">
    <h3 style="color:var(--neon); margin-top:0;">آن لائن شاگردوں کی فہرست</h3>
    <div id="shagird-found">شاگردوں کی تلاش جاری ہے...</div>
</div>

<script>
    // Firebase Config (Connectivity کے لیے)
    const fbConf = { databaseURL: "https://free-education-hub-fida-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(fbConf);
    const db = firebase.database();

    // Peer Config (Google Servers)
    const peer = new Peer({
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
    });

    let localStream;
    const stat = document.getElementById('status-bar');

    // 1. کیمرہ پکڑنا
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(s => {
        localStream = s;
        document.getElementById('myCam').srcObject = s;
        stat.innerText = "کیمرہ تیار ہے! نیٹ ورک سے جڑ رہے ہیں...";
    });

    // 2. آن لائن رجسٹریشن
    peer.on('open', id => {
        stat.innerText = "آپ لائیو جانے کے لیے تیار ہیں۔";
        db.ref('hub_v4/' + id).set({ id: id, last: Date.now() });
        db.ref('hub_v4/' + id).onDisconnect().remove();
    });

    // 3. آٹو ڈسکوری (شاگردوں کو دیکھنا)
    db.ref('hub_v4').on('value', snap => {
        const list = document.getElementById('shagird-found');
        list.innerHTML = "";
        let found = false;
        snap.forEach(c => {
            const u = c.val();
            if (u.id !== peer.id) {
                found = true;
                list.innerHTML += `<button class="btn-live" onclick="goLive('${u.id}')">شاگرد کے ساتھ لائیو بیٹھیں</button>`;
            }
        });
        if (!found) list.innerHTML = "ابھی کوئی شاگرد آن لائن نہیں ہے...";
    });

    // 4. کال کرنا (Outgoing)
    function goLive(target) {
        stat.innerText = "رابطہ کرنے کی کوشش جاری ہے...";
        const call = peer.call(target, localStream);
        call.on('stream', rs => {
            document.getElementById('peerCam').srcObject = rs;
            stat.innerText = "رابطہ کامیاب! لائیو شروع ہو چکا ہے۔";
        });
    }

    // 5. کال وصول کرنا (Incoming)
    peer.on('call', call => {
        stat.innerText = "کال آ رہی ہے، جواب دے رہے ہیں...";
        call.answer(localStream);
        call.on('stream', rs => {
            document.getElementById('peerCam').srcObject = rs;
            stat.innerText = "شاگرد جڑ چکا ہے!";
        });
    });

    peer.on('error', e => { stat.innerText = "نیٹ ورک کا مسئلہ: دوبارہ پیج ریفریش کریں۔"; });

</script>
</body>
</html>
