<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Fida Live Fix</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        header { background: #000; padding: 15px; border-bottom: 3px solid #00e676; box-shadow: 0 0 20px #00e67655; }
        .v-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 10px; }
        .v-box { position: relative; width: 45%; min-width: 300px; height: 220px; background: #111; border-radius: 15px; border: 2px solid #222; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 2px 10px; border-radius: 5px; color: #00e676; font-size: 12px; }
        #log { background: #111; color: #00e676; padding: 10px; margin: 10px; font-size: 11px; border-radius: 8px; border: 1px solid #333; height: 50px; overflow-y: auto; text-align: left; }
        .btn { background: #00e676; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 10px; font-size: 16px; box-shadow: 0 5px 15px #00e67644; }
        .online-panel { background: #1a1a1a; padding: 20px; margin: 15px; border-radius: 20px; border: 1px solid #333; }
    </style>
</head>
<body>

<header><h2>FREE EDUCATION HUB</h2></header>

<div id="log">سسٹم لوڈ ہو رہا ہے...</div>

<div class="v-container">
    <div class="v-box" style="border-color: #00e676;">
        <video id="myVideo" autoplay muted playsinline></video>
        <span class="label">آپ کا چہرہ</span>
    </div>
    <div class="v-box">
        <video id="peerVideo" autoplay playsinline></video>
        <span class="label">شاگرد کا چہرہ</span>
    </div>
</div>

<div class="online-panel">
    <h3 style="color:#00e676; margin-top: 0;">لائیو شاگردوں کی فہرست</h3>
    <div id="user-list">شاگرد تلاش کر رہے ہیں...</div>
</div>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://free-education-hub-fida-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // PeerJS with Force TURN/STUN
    const peer = new Peer({
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ]
        }
    });

    let localStream;
    const logBox = document.getElementById('log');

    function log(msg) {
        logBox.innerHTML += `<div>> ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // 1. کیمرہ شروع کریں
    navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
        localStream = stream;
        document.getElementById('myVideo').srcObject = stream;
        log("کیمرہ ٹھیک چل رہا ہے۔");
    }).catch(e => log("کیمرہ نہیں مل رہا۔"));

    // 2. آئی ڈی بنانا اور ڈیٹا بیس میں ڈالنا
    peer.on('open', id => {
        log("آپ کا سسٹم آن لائن ہے۔");
        db.ref('active_sessions/' + id).set({ id: id });
        db.ref('active_sessions/' + id).onDisconnect().remove();
    });

    // 3. شاگردوں کو ڈھونڈنا (آٹو ڈسکوری)
    db.ref('active_sessions').on('value', snap => {
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        let found = false;
        snap.forEach(child => {
            const user = child.val();
            if (user.id !== peer.id) {
                found = true;
                list.innerHTML += `<button class="btn" onclick="startLive('${user.id}')">اس شاگرد سے ویڈیو کال جوڑیں</button>`;
            }
        });
        if (!found) list.innerHTML = "ابھی کوئی شاگرد آن لائن نہیں ہے۔";
    });

    // 4. ویڈیو کال جوڑنا
    function startLive(targetId) {
        log("کنکشن جوڑنے کی کوشش...");
        const call = peer.call(targetId, localStream);
        
        call.on('stream', remoteStream => {
            log("ویڈیو موصول ہو گئی!");
            document.getElementById('peerVideo').srcObject = remoteStream;
        });

        // اگر 10 سیکنڈ میں کنیکٹ نہ ہو
        setTimeout(() => {
            if(!document.getElementById('peerVideo').srcObject) {
                log("دوبارہ کوشش کر رہے ہیں...");
                startLive(targetId);
            }
        }, 10000);
    }

    // 5. کال کا جواب دینا
    peer.on('call', call => {
        log("شاگرد کی کال آ رہی ہے...");
        call.answer(localStream);
        call.on('stream', remoteStream => {
            log("شاگرد لائیو آ گیا۔");
            document.getElementById('peerVideo').srcObject = remoteStream;
        });
    });

    peer.on('error', e => log("نیٹ ورک کا مسئلہ: " + e.type));

</script>
</body>
</html>
